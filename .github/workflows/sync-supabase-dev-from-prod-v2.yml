name: Sync Supabase dev from prod

permissions:
  contents: read

on:
  schedule:
    # Daily 09:17 AM JST
    - cron: "17 00 * * *"
  workflow_dispatch:

concurrency:
  group: supabase-prod-to-dev-sync
  cancel-in-progress: false

jobs:
  sync-public-schema:
    runs-on: ubuntu-latest
    env:
      # Use each project’s Direct connection string (port 5432), not the transaction pooler (6543).
      # Pooler URLs often break pg_dump/pg_restore. Add ?sslmode=require if your client needs it.
      PROD_DATABASE_URL: ${{ secrets.SUPABASE_PROD_DATABASE_URL }}
      DEV_DATABASE_URL: ${{ secrets.SUPABASE_DEV_DATABASE_URL }}
    steps:
      - name: Verify secrets
        run: |
          if [ -z "$PROD_DATABASE_URL" ] || [ -z "$DEV_DATABASE_URL" ]; then
            echo "::error::Set repository secrets SUPABASE_PROD_DATABASE_URL and SUPABASE_DEV_DATABASE_URL."
            exit 1
          fi

      # Match Supabase server major version (e.g. 17.x). Ubuntu’s default postgresql-client is older and aborts on mismatch.
      - name: Dump prod (public schema only)
        run: |
          docker run --rm \
            -e PROD_DATABASE_URL \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            postgres:17 \
            bash -lc 'pg_dump --dbname="$PROD_DATABASE_URL" --schema=public --no-owner --no-acl --format=custom --file=/work/prod_public.dump'

      - name: Restore into dev
        run: |
          docker run --rm \
            -e DEV_DATABASE_URL \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            postgres:17 \
            bash -lc 'pg_restore --dbname="$DEV_DATABASE_URL" --clean --if-exists --no-owner --no-acl /work/prod_public.dump'
      - name: Re-apply grants
        run: |
          docker run --rm \
            -e DEV_DATABASE_URL \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            postgres:17 \
            bash -lc '
              psql "$DEV_DATABASE_URL" <<SQL
                grant usage on schema public to anon, authenticated;
                grant select, insert, update, delete on all tables in schema public to anon, authenticated;
                grant usage, select on all sequences in schema public to anon, authenticated;
                grant execute on function public.promote_draft_if_complete(text, jsonb) to anon, authenticated;
              SQL
            '
      - name: Print timing context
        run: |
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Local: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Event: ${{ github.event_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
