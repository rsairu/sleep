<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sleep Graph</title>
<link rel="stylesheet" href="sleep.css">
</head>
<body>
  <div id="nav-container"></div>
  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 20px;">
      <h1 style="margin: 0;">Sleep Graph</h1>
      <div class="show-hide-section">
        <div class="show-hide-title">show/hide</div>
        <label class="time-toggle">
          <input type="checkbox" id="show-bedtime-line" checked>
          <div class="legend-line bedtime"></div>
          <span>bed time</span>
        </label>
        <label class="time-toggle">
          <input type="checkbox" id="show-sleep-start-line" checked>
          <div class="legend-line sleep-start"></div>
          <span>fell asleep</span>
        </label>
        <label class="time-toggle">
          <input type="checkbox" id="show-getup-line" checked>
          <div class="legend-line getup"></div>
          <span>get up</span>
        </label>
        <label class="time-toggle">
          <input type="checkbox" id="show-getup-regression" checked>
          <div class="legend-line getup-regression"></div>
          <span>get up trend</span>
        </label>
        <label class="time-toggle">
          <input type="checkbox" id="show-sleep-start-regression" checked>
          <div class="legend-line sleep-start-regression"></div>
          <span>fell asleep trend</span>
        </label>
        <label class="time-toggle">
          <input type="checkbox" id="show-bedtime-regression" checked>
          <div class="legend-line bedtime-regression"></div>
          <span>bed time trend</span>
        </label>
      </div>
    </div>
    <div class="graph-container" id="graph-container">
      <svg id="graph-svg"></svg>
    </div>
    <div class="graph-container" id="bar-chart-container" style="margin-top: 40px;">
      <svg id="bar-chart-svg"></svg>
    </div>
    <div class="graph-container" id="delay-chart-container" style="margin-top: 40px;">
      <svg id="delay-chart-svg"></svg>
    </div>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <div class="day-panel" id="day-panel"></div>

  <script src="sleep-utils.js"></script>
  <script>
    // Add navigation bar
    document.getElementById('nav-container').innerHTML = renderNavBar('graph');
    // Note: timeToMinutes and formatTime are now in sleep-utils.js
    // Use formatTime(minutes, true) for short midnight format ("00")

    // Normalize time for Y-axis positioning
    // Y-axis now goes from 5PM (17:00) to 5PM next day
    // Times before 5PM (00:00-16:59) should appear after midnight (add 1440)
    // Times from 5PM onwards (17:00-23:59) stay as is
    // Times after midnight (00:00-16:59) get 1440 added to appear after 23:59
    function normalizeTimeForYAxis(minutes) {
      if (minutes < 1020) { // Before 5pm (17:00)
        return minutes + 1440; // Add 24 hours to make them appear after midnight
      }
      return minutes; // 17:00-23:59 stay as is
    }

        // Note: parseDate (getDateFromString), calculateTotalSleep, formatDuration, 
        // isWeekend, and isHoliday are now in sleep-utils.js
        // Use getDateFromString(dateString, year) instead of parseDate

        // Calculate wake delay (first alarm to wake up)
        function calculateWakeDelay(day) {
          if (!day.alarm || day.alarm.length === 0) {
            return null;
          }
          const firstAlarm = Math.min(...day.alarm.map(timeToMinutes));
          const wakeTime = timeToMinutes(day.sleepEnd);
          // Calculate delay
          let delay = wakeTime - firstAlarm;
          // Handle midnight crossing: if delay is negative and alarm is late (after 18:00),
          // wake time is likely next day
          if (delay < 0 && firstAlarm >= 1080) {
            delay = (wakeTime + 1440) - firstAlarm;
          }
          // Only return positive delays (snoozing), negative means woke up before alarm
          return delay > 0 ? delay : null;
        }

        // Calculate sleep delay (bed to sleep start)
        function calculateSleepDelay(day) {
          const bedTime = timeToMinutes(day.bed);
          const sleepStart = timeToMinutes(day.sleepStart);
          let delay = sleepStart - bedTime;
          if (delay < 0) {
            delay += 1440; // Add 24 hours if sleep is after midnight
          }
          return delay;
        }

        // Polynomial regression function (non-linear)
        // Returns coefficients [a, b, c] for y = a*x² + b*x + c (quadratic)
        // Can be extended to higher degrees if needed
        function polynomialRegression(xValues, yValues, degree = 2) {
          const n = xValues.length;
          
          // Build the design matrix X
          const X = [];
          for (let i = 0; i < n; i++) {
            const row = [];
            for (let d = degree; d >= 0; d--) {
              row.push(Math.pow(xValues[i], d));
            }
            X.push(row);
          }
          
          // Build X^T * X and X^T * Y
          const XTX = [];
          const XTY = [];
          
          for (let i = 0; i <= degree; i++) {
            XTX[i] = [];
            XTY[i] = 0;
            for (let j = 0; j <= degree; j++) {
              let sum = 0;
              for (let k = 0; k < n; k++) {
                sum += X[k][i] * X[k][j];
              }
              XTX[i][j] = sum;
            }
            for (let k = 0; k < n; k++) {
              XTY[i] += X[k][i] * yValues[k];
            }
          }
          
          // Solve the system using Gaussian elimination
          const coefficients = solveLinearSystem(XTX, XTY);
          
          return coefficients; // [a, b, c] for quadratic, or [a, b] for linear, etc.
        }
        
        // Helper function to solve linear system using Gaussian elimination
        function solveLinearSystem(A, b) {
          const n = A.length;
          const augmented = A.map((row, i) => [...row, b[i]]);
          
          // Forward elimination
          for (let i = 0; i < n; i++) {
            // Find pivot
            let maxRow = i;
            for (let k = i + 1; k < n; k++) {
              if (Math.abs(augmented[k][i]) > Math.abs(augmented[maxRow][i])) {
                maxRow = k;
              }
            }
            [augmented[i], augmented[maxRow]] = [augmented[maxRow], augmented[i]];
            
            // Make all rows below this one 0 in current column
            for (let k = i + 1; k < n; k++) {
              const factor = augmented[k][i] / augmented[i][i];
              for (let j = i; j <= n; j++) {
                augmented[k][j] -= factor * augmented[i][j];
              }
            }
          }
          
          // Back substitution
          const x = new Array(n);
          for (let i = n - 1; i >= 0; i--) {
            x[i] = augmented[i][n];
            for (let j = i + 1; j < n; j++) {
              x[i] -= augmented[i][j] * x[j];
            }
            x[i] /= augmented[i][i];
          }
          
          return x;
        }
        
        // Evaluate polynomial at given x value
        function evaluatePolynomial(coefficients, x) {
          let result = 0;
          for (let i = 0; i < coefficients.length; i++) {
            result += coefficients[i] * Math.pow(x, coefficients.length - 1 - i);
          }
          return result;
        }

        // Load and render graph
    Promise.all([
      fetch('sleep-data.json').then(response => response.json()),
      fetch('holidays.json').then(response => response.json())
    ])
      .then(([data, holidaysData]) => {
        const holidays = holidaysData;
        // Process data: convert to array of {date, bedTimeMinutes, bedTimeString, sleepStartMinutes, sleepStartString, getUpMinutes, getUpString, sleepDurationMinutes}
        const points = data.days.map(day => {
          const rawBedMinutes = timeToMinutes(day.bed);
          const rawSleepStartMinutes = timeToMinutes(day.sleepStart);
          const rawGetUpMinutes = timeToMinutes(day.sleepEnd);
          const sleepDuration = calculateTotalSleep(day);
          
          // Calculate main sleep (without nap)
          const sleepStart = timeToMinutes(day.sleepStart);
          const sleepEnd = timeToMinutes(day.sleepEnd);
          const mainSleep = sleepEnd >= sleepStart 
            ? sleepEnd - sleepStart 
            : sleepEnd + 1440 - sleepStart;
          
          // Calculate nap duration if exists
          let napDuration = 0;
          if (day.nap && day.nap.start && day.nap.end) {
            const napStart = timeToMinutes(day.nap.start);
            const napEnd = timeToMinutes(day.nap.end);
            napDuration = napEnd >= napStart 
              ? napEnd - napStart 
              : napEnd + 1440 - napStart;
          }
          
          // Calculate wake delay and sleep delay
          const wakeDelay = calculateWakeDelay(day);
          const sleepDelay = calculateSleepDelay(day);
          
          return {
            date: getDateFromString(day.date),
            bedTimeMinutes: normalizeTimeForYAxis(rawBedMinutes),
            bedTimeRawMinutes: rawBedMinutes, // Keep original for display
            bedTimeString: day.bed,
            sleepStartMinutes: normalizeTimeForYAxis(rawSleepStartMinutes),
            sleepStartRawMinutes: rawSleepStartMinutes, // Keep original for display
            sleepStartString: day.sleepStart,
            getUpMinutes: normalizeTimeForYAxis(rawGetUpMinutes),
            getUpRawMinutes: rawGetUpMinutes, // Keep original for display
            getUpString: day.sleepEnd,
            dateString: day.date,
            sleepDurationMinutes: sleepDuration,
            mainSleepMinutes: mainSleep,
            napMinutes: napDuration,
            wakeDelayMinutes: wakeDelay,
            sleepDelayMinutes: sleepDelay,
            firstAlarm: day.alarm && day.alarm.length > 0 ? day.alarm[0] : null
          };
        });

        // Sort by date (oldest first for left-to-right display)
        points.sort((a, b) => a.date - b.date);

        // Y-axis: start from 5pm (17:00 = 1020) and go to 5pm next day (17:00 + 1440 = 2460)
        // This covers: 17:00, 18:00, 19:00, 20:00, 21:00, 22:00, 23:00, 00:00, 01:00, ..., 16:00, 17:00
        const yMin = 1020; // 5pm
        const yMax = 2460; // 5pm next day (17:00 + 1440 = 2460)
        
        // Adjust based on actual data range (include bed times, sleep start times, and get up times)
        const bedTimes = points.map(p => p.bedTimeMinutes);
        const sleepStartTimes = points.map(p => p.sleepStartMinutes);
        const getUpTimes = points.map(p => p.getUpMinutes);
        const allTimes = [...bedTimes, ...sleepStartTimes, ...getUpTimes];
        const dataMin = Math.min(...allTimes);
        const dataMax = Math.max(...allTimes);
        
        // Extend range if needed, but keep 5pm as minimum and 5pm next day as maximum
        const finalYMin = Math.min(yMin, Math.max(1020, dataMin - 30));
        const finalYMax = Math.max(yMax, Math.min(2460, dataMax + 30));

        // Right y-axis: same as left y-axis (time scale)

        // Graph dimensions - increase right margin for second y-axis
        // Extend width to accommodate 10 more days for trend projection
        const totalDays = points.length + 10;
        const margin = { top: 40, right: 80, bottom: 60, left: 80 };
        const width = Math.max(800, totalDays * 20); // At least 20px per point
        const height = 700;
        const graphWidth = width - margin.left - margin.right;
        const graphHeight = height - margin.top - margin.bottom;

        // Create SVG
        const svg = document.getElementById('graph-svg');
        svg.setAttribute('width', width);
        svg.setAttribute('height', height);

        // Create main group
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('transform', `translate(${margin.left},${margin.top})`);
        svg.appendChild(g);

        // X scale (dates) - extend range by 10 days for trend line projection
        const minDate = points[0].date;
        const maxDate = points[points.length - 1].date;
        const extendedMaxDate = new Date(maxDate);
        extendedMaxDate.setDate(extendedMaxDate.getDate() + 10); // Add 10 days
        const dateRange = extendedMaxDate - minDate;
        
        const xScale = (date) => {
          return ((date - minDate) / dateRange) * graphWidth;
        };

        // Calculate width of one day in graph units
        // Use number of days, not milliseconds
        const numDays = points.length;
        const dayWidth = graphWidth / numDays;

        // Y scale (bed times in minutes) - left axis
        const yScale = (minutes) => {
          return graphHeight - ((minutes - finalYMin) / (finalYMax - finalYMin)) * graphHeight;
        };

        // Create standard time ticks: 17:00, 18:00, 19:00, ..., 23:00, 00:00, 01:00, ..., 16:00, 17:00
        const yTicks = [];
        // Start from 5pm (17:00 = 1020) and add hourly ticks up to 5pm next day (17:00 + 1440 = 2460)
        for (let hour = 17; hour <= 41; hour++) {
          const minutes = (hour % 24) * 60;
          // For hours 24-41, add 1440 to make them appear after midnight
          const tickValue = hour < 24 ? minutes : minutes + 1440;
          if (tickValue >= finalYMin && tickValue <= finalYMax) {
            yTicks.push(tickValue);
          }
        }

        // Draw recession bars for weekends and holidays (behind everything)
        // Do this first so they appear behind all other elements
        // Calculate bar width - use a minimum width to ensure visibility
        const barWidth = Math.max(dayWidth, graphWidth / points.length);
        
        points.forEach((point) => {
          const isWeekendDay = isWeekend(point.date);
          const isHolidayDay = isHoliday(point.date, holidays);
          
          if (isWeekendDay || isHolidayDay) {
            const x = xScale(point.date);
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            // Center the bar on the data point, make it wider for visibility
            rect.setAttribute('x', x - barWidth / 2);
            rect.setAttribute('y', 0);
            rect.setAttribute('width', barWidth);
            rect.setAttribute('height', graphHeight);
            rect.setAttribute('class', isHolidayDay ? 'recession-bar holiday' : 'recession-bar');
            // Insert at the beginning so it appears behind other elements
            g.insertBefore(rect, g.firstChild);
          }
        });

        yTicks.forEach(tick => {
          const y = yScale(tick);
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', 0);
          line.setAttribute('y1', y);
          line.setAttribute('x2', xScale(extendedMaxDate));
          line.setAttribute('y2', y);
          line.setAttribute('class', 'grid-line');
          g.appendChild(line);
        });

        // Draw X-axis - extend to cover the extended range
        const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        xAxis.setAttribute('x1', 0);
        xAxis.setAttribute('y1', graphHeight);
        xAxis.setAttribute('x2', xScale(extendedMaxDate));
        xAxis.setAttribute('y2', graphHeight);
        xAxis.setAttribute('class', 'axis');
        g.appendChild(xAxis);

        // Draw left Y-axis (bed times)
        const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        yAxis.setAttribute('x1', 0);
        yAxis.setAttribute('y1', 0);
        yAxis.setAttribute('x2', 0);
        yAxis.setAttribute('y2', graphHeight);
        yAxis.setAttribute('class', 'axis');
        g.appendChild(yAxis);

        // Draw right Y-axis (sleep duration)
        const yAxisRight = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        yAxisRight.setAttribute('x1', graphWidth);
        yAxisRight.setAttribute('y1', 0);
        yAxisRight.setAttribute('x2', graphWidth);
        yAxisRight.setAttribute('y2', graphHeight);
        yAxisRight.setAttribute('class', 'axis');
        g.appendChild(yAxisRight);

        // Draw Y-axis labels and ticks
        yTicks.forEach(tick => {
          const y = yScale(tick);
          const tickLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          tickLine.setAttribute('x1', -5);
          tickLine.setAttribute('y1', y);
          tickLine.setAttribute('x2', 0);
          tickLine.setAttribute('y2', y);
          tickLine.setAttribute('class', 'axis');
          g.appendChild(tickLine);

          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', -10);
          label.setAttribute('y', y + 4);
          label.setAttribute('class', 'axis-label');
          label.setAttribute('text-anchor', 'end');
          // Format tick label: show as 24-hour clock format (hours only, no :00)
          const tickHours = Math.floor(tick / 60) % 24;
          if (tick >= 1440) {
            // After midnight (next day)
            const nextDayHours = Math.floor((tick - 1440) / 60);
            label.textContent = String(nextDayHours).padStart(2, '0');
          } else {
            // Before midnight
            label.textContent = String(tickHours).padStart(2, '0');
          }
          g.appendChild(label);
        });

        // Draw X-axis labels (show only month starts: Jan, Feb, etc.)
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        points.forEach((point, index) => {
          // Check if this is the 1st of the month
          const [month, day] = point.dateString.split('/').map(Number);
          if (day === 1) {
            const x = xScale(point.date);
            const tickLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            tickLine.setAttribute('x1', x);
            tickLine.setAttribute('y1', graphHeight);
            tickLine.setAttribute('x2', x);
            tickLine.setAttribute('y2', graphHeight + 5);
            tickLine.setAttribute('class', 'axis');
            g.appendChild(tickLine);

            const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            label.setAttribute('x', x);
            label.setAttribute('y', graphHeight + 20);
            label.setAttribute('class', 'axis-label');
            label.setAttribute('text-anchor', 'middle');
            // Show month abbreviation (month is 1-indexed, so subtract 1 for array index)
            label.textContent = monthNames[month - 1];
            g.appendChild(label);
          }
        });

        // Draw axis titles
        const xAxisTitle = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        xAxisTitle.setAttribute('x', margin.left + graphWidth / 2);
        xAxisTitle.setAttribute('y', height - 10);
        xAxisTitle.setAttribute('class', 'axis-title');
        xAxisTitle.setAttribute('text-anchor', 'middle');
        xAxisTitle.textContent = 'Date';
        svg.appendChild(xAxisTitle);

        const yAxisTitle = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        yAxisTitle.setAttribute('x', -height / 2);
        yAxisTitle.setAttribute('y', 20);
        yAxisTitle.setAttribute('class', 'axis-title');
        yAxisTitle.setAttribute('text-anchor', 'middle');
        yAxisTitle.setAttribute('transform', 'rotate(-90)');
        yAxisTitle.textContent = 'Time';
        svg.appendChild(yAxisTitle);

        // Draw right Y-axis labels and ticks (same as left axis)
        yTicks.forEach(tick => {
          const y = yScale(tick);
          const tickLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          tickLine.setAttribute('x1', graphWidth);
          tickLine.setAttribute('y1', y);
          tickLine.setAttribute('x2', graphWidth + 5);
          tickLine.setAttribute('y2', y);
          tickLine.setAttribute('class', 'axis');
          g.appendChild(tickLine);

          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', graphWidth + 10);
          label.setAttribute('y', y + 4);
          label.setAttribute('class', 'axis-label');
          label.setAttribute('text-anchor', 'start');
          // Format tick label: show as 24-hour clock format (hours only, no :00)
          const tickHours = Math.floor(tick / 60) % 24;
          if (tick >= 1440) {
            // After midnight (next day)
            const nextDayHours = Math.floor((tick - 1440) / 60);
            label.textContent = String(nextDayHours).padStart(2, '0');
          } else {
            // Before midnight
            label.textContent = String(tickHours).padStart(2, '0');
          }
          g.appendChild(label);
        });

        const yAxisTitleRight = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        yAxisTitleRight.setAttribute('x', width - 20);
        yAxisTitleRight.setAttribute('y', height / 2);
        yAxisTitleRight.setAttribute('class', 'axis-title');
        yAxisTitleRight.setAttribute('text-anchor', 'middle');
        yAxisTitleRight.setAttribute('transform', `rotate(-90 ${width - 20} ${height / 2})`);
        yAxisTitleRight.textContent = 'Time';
        svg.appendChild(yAxisTitleRight);

        // Draw bed time data line
        const pathBedtime = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        let pathDataBedtime = '';
        points.forEach((point, index) => {
          const x = xScale(point.date);
          const y = yScale(point.bedTimeMinutes);
          if (index === 0) {
            pathDataBedtime += `M ${x} ${y}`;
          } else {
            pathDataBedtime += ` L ${x} ${y}`;
          }
        });
        pathBedtime.setAttribute('d', pathDataBedtime);
        pathBedtime.setAttribute('class', 'data-line bedtime');
        pathBedtime.setAttribute('id', 'bedtime-line');
        g.appendChild(pathBedtime);

        // Draw sleep start (fell asleep) data line
        const pathSleepStart = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        let pathDataSleepStart = '';
        points.forEach((point, index) => {
          const x = xScale(point.date);
          const y = yScale(point.sleepStartMinutes);
          if (index === 0) {
            pathDataSleepStart += `M ${x} ${y}`;
          } else {
            pathDataSleepStart += ` L ${x} ${y}`;
          }
        });
        pathSleepStart.setAttribute('d', pathDataSleepStart);
        pathSleepStart.setAttribute('class', 'data-line sleep-start');
        pathSleepStart.setAttribute('id', 'sleep-start-line');
        g.appendChild(pathSleepStart);

        // Draw get up data line
        const pathGetUp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        let pathDataGetUp = '';
        points.forEach((point, index) => {
          const x = xScale(point.date);
          const y = yScale(point.getUpMinutes);
          if (index === 0) {
            pathDataGetUp += `M ${x} ${y}`;
          } else {
            pathDataGetUp += ` L ${x} ${y}`;
          }
        });
        pathGetUp.setAttribute('d', pathDataGetUp);
        pathGetUp.setAttribute('class', 'data-line getup');
        pathGetUp.setAttribute('id', 'getup-line');
        g.appendChild(pathGetUp);

        // Calculate polynomial regression for get up times (quadratic, degree 2)
        const getUpXValues = points.map((point, index) => index);
        const getUpYValues = points.map(point => point.getUpMinutes);
        const getUpRegression = polynomialRegression(getUpXValues, getUpYValues, 2);
        
        // Calculate polynomial regression for sleep start times
        const sleepStartXValues = points.map((point, index) => index);
        const sleepStartYValues = points.map(point => point.sleepStartMinutes);
        const sleepStartRegression = polynomialRegression(sleepStartXValues, sleepStartYValues, 2);
        
        // Calculate polynomial regression for bed time (quadratic, degree 2)
        const bedtimeXValues = points.map((point, index) => index);
        const bedtimeYValues = points.map(point => point.bedTimeMinutes);
        const bedtimeRegression = polynomialRegression(bedtimeXValues, bedtimeYValues, 2);

        // Draw get up regression curve - extend 10 more days
        const getUpRegPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        let getUpPathData = '';
        const extendedIndex = points.length - 1 + 10;
        const extendedMaxDateForCurve = new Date(maxDate.getTime() + 10 * 24 * 60 * 60 * 1000);
        // Generate curve points for smooth rendering
        for (let i = 0; i <= extendedIndex; i++) {
          const x = xScale(new Date(minDate.getTime() + i * 24 * 60 * 60 * 1000));
          const y = yScale(evaluatePolynomial(getUpRegression, i));
          if (i === 0) {
            getUpPathData += `M ${x} ${y}`;
          } else {
            getUpPathData += ` L ${x} ${y}`;
          }
        }
        getUpRegPath.setAttribute('d', getUpPathData);
        getUpRegPath.setAttribute('class', 'regression-line getup-regression');
        getUpRegPath.setAttribute('id', 'getup-regression-line');
        getUpRegPath.setAttribute('fill', 'none');
        g.appendChild(getUpRegPath);

        // Draw sleep start regression curve - extend 10 more days
        const sleepStartRegPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        let sleepStartPathData = '';
        // Generate curve points for smooth rendering
        for (let i = 0; i <= extendedIndex; i++) {
          const x = xScale(new Date(minDate.getTime() + i * 24 * 60 * 60 * 1000));
          const y = yScale(evaluatePolynomial(sleepStartRegression, i));
          if (i === 0) {
            sleepStartPathData += `M ${x} ${y}`;
          } else {
            sleepStartPathData += ` L ${x} ${y}`;
          }
        }
        sleepStartRegPath.setAttribute('d', sleepStartPathData);
        sleepStartRegPath.setAttribute('class', 'regression-line sleep-start-regression');
        sleepStartRegPath.setAttribute('id', 'sleep-start-regression-line');
        sleepStartRegPath.setAttribute('fill', 'none');
        g.appendChild(sleepStartRegPath);

        // Draw bed time regression curve - extend 10 more days
        const bedtimeRegPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');

        // Use same dimensions and scales as main graph

        // Create delay chart SVG
        const delayChartSvg = document.getElementById('delay-chart-svg');

        delayChartSvg.setAttribute('width', delayChartWidth);

        // Create main group for delay chart
        const delayChartG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        delayChartG.setAttribute('transform', `translate(${delayChartMargin.left},${delayChartMargin.top})`);
        delayChartSvg.appendChild(delayChartG);

        // Y scale for delays: negative values (sleep delay) to positive (wake delay)
        // Range: -3 hours (-180 minutes) to 3 hours (180 minutes)
        // 0 is positioned in the middle
        const delayYMin = -180; // -3 hours (sleep delay)
        const delayYMax = 180; // 3 hours (wake delay)
        // Allocate 50% of graph height for negative range, 50% for positive range
        const negativeHeight = delayChartGraphHeight * 0.5;
        const positiveHeight = delayChartGraphHeight * 0.5;
        const zeroY = delayChartGraphHeight / 2; // 0 is at middle
        const delayYScale = (minutes) => {
          if (minutes >= 0) {
            // Positive values: scale from 0 (at zeroY) to delayYMax (at top = 0)
            return zeroY - (minutes / delayYMax) * positiveHeight;
          } else {
            // Negative values: scale from delayYMin (at bottom = delayChartGraphHeight) to 0 (at zeroY)
            const negativeRange = Math.abs(delayYMin);
            return zeroY + (Math.abs(minutes) / negativeRange) * negativeHeight;
          }
        };

        const delayYTicks = [];
        // Negative ticks (sleep delay)

        }

        }

          // Show negative values with absolute value (e.g., -1h shows as "1")
          if (tick < 0) {
            label.textContent = `${Math.abs(tick / 60)}`;
          } else {
            label.textContent = `${tick / 60}h`;
          }
          delayChartG.appendChild(label);
        });

        // Draw X-axis labels (same as main graph - month starts)
        points.forEach((point) => {
          const [month, day] = point.dateString.split('/').map(Number);
          if (day === 1) {
            const x = xScale(point.date);
            const tickLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            tickLine.setAttribute('x1', x);
            tickLine.setAttribute('y1', zeroY);
            tickLine.setAttribute('x2', x);
            tickLine.setAttribute('y2', zeroY + 5);
            tickLine.setAttribute('class', 'axis');
            delayChartG.appendChild(tickLine);

            const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            label.setAttribute('x', x);
            label.setAttribute('y', zeroY + 20);
            label.setAttribute('class', 'axis-label');
            label.setAttribute('text-anchor', 'middle');
            label.textContent = monthNames[month - 1];
            delayChartG.appendChild(label);
          }
        });

        // Draw axis titles for delay chart
        const delayChartXAxisTitle = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        delayChartXAxisTitle.setAttribute('x', delayChartMargin.left + delayChartGraphWidth / 2);
        delayChartXAxisTitle.setAttribute('y', delayChartHeight - 10);
        delayChartXAxisTitle.setAttribute('class', 'axis-title');
        delayChartXAxisTitle.setAttribute('text-anchor', 'middle');
        delayChartXAxisTitle.textContent = 'Date';
        delayChartSvg.appendChild(delayChartXAxisTitle);

        const delayChartYAxisTitle = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        delayChartYAxisTitle.setAttribute('x', -delayChartHeight / 2);
        delayChartYAxisTitle.setAttribute('y', 20);
        delayChartYAxisTitle.setAttribute('class', 'axis-title');
        delayChartYAxisTitle.setAttribute('text-anchor', 'middle');
        delayChartYAxisTitle.setAttribute('transform', 'rotate(-90)');
        delayChartYAxisTitle.textContent = 'Delay';
        delayChartSvg.appendChild(delayChartYAxisTitle);

        // Draw bars for wake delay (positive, above zero) and sleep delay (negative, below zero)
        const delayBarWidth = Math.max(2, dayWidth * 0.8); // 80% of day width, minimum 2px
        
        points.forEach((point) => {
          const x = xScale(point.date);
          
          // Draw sleep delay bar (negative, below zero)
          if (point.sleepDelayMinutes !== null && point.sleepDelayMinutes !== undefined && point.sleepDelayMinutes > 0) {
            const sleepDelayNegative = -point.sleepDelayMinutes;
            const delayBarBottomY = delayYScale(sleepDelayNegative);
            const delayBarHeight = delayBarBottomY - zeroY;
            
            if (delayBarHeight > 0 && !isNaN(delayBarHeight)) {
              const sleepDelayRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
              sleepDelayRect.setAttribute('x', x - delayBarWidth / 2);
              sleepDelayRect.setAttribute('y', zeroY); // Top of bar is at zero
              sleepDelayRect.setAttribute('width', delayBarWidth);
              sleepDelayRect.setAttribute('height', delayBarHeight);
              sleepDelayRect.setAttribute('class', 'sleep-bar delay-bar');
              sleepDelayRect.setAttribute('data-date', point.dateString);
              sleepDelayRect.setAttribute('data-delay', point.sleepDelayMinutes);

              // Add hover events for sleep delay bar
              sleepDelayRect.addEventListener('mouseenter', () => {
                tooltip.textContent = `${point.dateString}: ${formatDuration(point.sleepDelayMinutes)} sleep delay (bed ${point.bedTimeString} → sleep ${point.sleepStartString})`;
                tooltip.classList.add('visible');
              });

              sleepDelayRect.addEventListener('mousemove', (e) => {
                tooltip.style.left = (e.clientX + 10) + 'px';
                tooltip.style.top = (e.clientY - 10) + 'px';
              });

              sleepDelayRect.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
              });

              delayChartG.appendChild(sleepDelayRect);
            }
          }
          
          // Draw wake delay bar (positive, above zero)
          if (point.wakeDelayMinutes !== null && point.wakeDelayMinutes !== undefined && point.wakeDelayMinutes > 0) {
            const wakeDelayBarY = delayYScale(point.wakeDelayMinutes);
            const wakeDelayBarHeight = zeroY - wakeDelayBarY;
            
            if (wakeDelayBarHeight > 0 && !isNaN(wakeDelayBarHeight) && wakeDelayBarY >= 0) {
              const wakeDelayRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
              wakeDelayRect.setAttribute('x', x - delayBarWidth / 2);
              wakeDelayRect.setAttribute('y', wakeDelayBarY);
              wakeDelayRect.setAttribute('width', delayBarWidth);
              wakeDelayRect.setAttribute('height', wakeDelayBarHeight);
              wakeDelayRect.setAttribute('class', 'sleep-bar wake-delay-bar');
              wakeDelayRect.setAttribute('data-date', point.dateString);
              wakeDelayRect.setAttribute('data-delay', point.wakeDelayMinutes);

              // Add hover events for wake delay bar
              wakeDelayRect.addEventListener('mouseenter', () => {
                const alarmText = point.firstAlarm ? ` (alarm ${point.firstAlarm} → get up ${point.getUpString})` : '';
                tooltip.textContent = `${point.dateString}: ${formatDuration(point.wakeDelayMinutes)} wake delay${alarmText}`;
                tooltip.classList.add('visible');
              });

              wakeDelayRect.addEventListener('mousemove', (e) => {
                tooltip.style.left = (e.clientX + 10) + 'px';
                tooltip.style.top = (e.clientY - 10) + 'px';
              });

              wakeDelayRect.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
              });

              delayChartG.appendChild(wakeDelayRect);
            }
          }
        });

        // Calculate polynomial regression for wake delay (only points with wake delay data)
        const wakeDelayPoints = points.filter(p => p.wakeDelayMinutes !== null && p.wakeDelayMinutes !== undefined && p.wakeDelayMinutes > 0);
        if (wakeDelayPoints.length > 0) {
          const wakeDelayXValues = wakeDelayPoints.map((point, index) => {
            // Find the original index in the full points array
            return points.indexOf(point);
          });
          const wakeDelayYValues = wakeDelayPoints.map(point => point.wakeDelayMinutes);
          const wakeDelayRegression = polynomialRegression(wakeDelayXValues, wakeDelayYValues, 2);

          // Draw wake delay trend curve
          const wakeDelayTrendPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          let wakeDelayTrendPathData = '';
          for (let i = 0; i < points.length; i++) {
            const predictedValue = evaluatePolynomial(wakeDelayRegression, i);
            // Only draw if predicted value is positive (wake delay)
            if (predictedValue > 0) {
              const x = xScale(points[i].date);
              const y = delayYScale(predictedValue);
              // Clamp y to valid range
              const clampedY = Math.max(0, Math.min(zeroY, y));
              if (i === 0 || wakeDelayTrendPathData === '') {
                wakeDelayTrendPathData += `M ${x} ${clampedY}`;
              } else {
                wakeDelayTrendPathData += ` L ${x} ${clampedY}`;
              }
            }
          }
          wakeDelayTrendPath.setAttribute('d', wakeDelayTrendPathData);
          wakeDelayTrendPath.setAttribute('class', 'regression-line wake-delay-trend');
          wakeDelayTrendPath.setAttribute('id', 'wake-delay-trend-line');
          wakeDelayTrendPath.setAttribute('fill', 'none');
          delayChartG.appendChild(wakeDelayTrendPath);
        }

        // Calculate polynomial regression for sleep delay (only points with sleep delay data)
        const sleepDelayPoints = points.filter(p => p.sleepDelayMinutes !== null && p.sleepDelayMinutes !== undefined && p.sleepDelayMinutes > 0);
        if (sleepDelayPoints.length > 0) {
          const sleepDelayXValues = sleepDelayPoints.map((point, index) => {
            // Find the original index in the full points array
            return points.indexOf(point);
          });
          // Use positive values for regression (actual delay)
          const sleepDelayYValues = sleepDelayPoints.map(point => point.sleepDelayMinutes);
          const sleepDelayRegression = polynomialRegression(sleepDelayXValues, sleepDelayYValues, 2);

          // Draw sleep delay trend curve
          const sleepDelayTrendPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          let sleepDelayTrendPathData = '';
          for (let i = 0; i < points.length; i++) {
            const predictedValue = evaluatePolynomial(sleepDelayRegression, i);
            // Only draw if predicted value is positive (sleep delay exists)
            if (predictedValue > 0) {
              const x = xScale(points[i].date);
              // Negate the value for display (show below zero)
              const y = delayYScale(-predictedValue);
              // Clamp y to valid range (below zero)
              const clampedY = Math.max(zeroY, Math.min(delayChartGraphHeight, y));
              if (i === 0 || sleepDelayTrendPathData === '') {
                sleepDelayTrendPathData += `M ${x} ${clampedY}`;
              } else {
                sleepDelayTrendPathData += ` L ${x} ${clampedY}`;
              }
            }
          }
          sleepDelayTrendPath.setAttribute('d', sleepDelayTrendPathData);
          sleepDelayTrendPath.setAttribute('class', 'regression-line sleep-delay-trend');
          sleepDelayTrendPath.setAttribute('id', 'sleep-delay-trend-line');
          sleepDelayTrendPath.setAttribute('fill', 'none');
          delayChartG.appendChild(sleepDelayTrendPath);
        }
        } catch (delayChartError) {
          console.error('Error rendering delay chart:', delayChartError);
          const errorDiv = document.createElement('div');
          errorDiv.style.cssText = 'color: red; padding: 10px; background: rgba(255,0,0,0.1); margin: 10px 0;';
          errorDiv.textContent = 'Delay chart error: ' + delayChartError.message;
          document.getElementById('delay-chart-container').appendChild(errorDiv);
        }
      })
      .catch(error => {
        console.error('Error loading data:', error);
        document.getElementById('graph-container').innerHTML = '<p>Error loading data</p>';
      });
  </script>
</body>
</html>
